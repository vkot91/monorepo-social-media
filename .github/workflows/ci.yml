name: Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: social_media_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d social_media_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 56380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/social_media_test
      REDIS_URL: redis://127.0.0.1:56380
      JWT_ACCESS_SECRET: ci-access-secret-must-be-at-least-32-chars
      JWT_REFRESH_SECRET: ci-refresh-secret-must-be-at-least-32-chars
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      CORS_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3001

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: blob:none

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch pull request base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Generate Prisma client
        run: pnpm --filter @social/database db:generate

      - name: Install Playwright browser
        run: pnpm --filter @social/web exec playwright install --with-deps chromium

      - name: Check affected packages
        if: github.event_name == 'pull_request'
        env:
          TURBO_SCM_BASE: origin/${{ github.base_ref }}
        run: pnpm check:affected

      - name: Check packages
        if: github.event_name != 'pull_request'
        run: pnpm check

      - name: Migrate test database
        run: pnpm test:db:migrate

      - name: Check E2E tests
        run: pnpm test:e2e
